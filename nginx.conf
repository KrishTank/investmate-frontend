server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Serve static files directly; fall back to index.html for any route
    # that doesn't match a real file, so client-side routing (if added
    # later) still works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built, hashed asset files aggressively.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
